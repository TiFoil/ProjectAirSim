name: Linux SimLibs Debug Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test-simlibs-debug:
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Prerequisites
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get -y install --no-install-recommends \
            build-essential rsync make cmake \
            clang-18 libc++-18-dev libc++abi-18-dev \
            ninja-build libvulkan1 vulkan-tools \
            libeigen3-dev

      - name: Configure Clang Compatibility
        shell: bash
        run: |
          sudo ln -sf /usr/bin/clang-18 /usr/bin/clang-13
          sudo ln -sf /usr/bin/clang++-18 /usr/bin/clang++-13

      - name: Build SimLibs
        shell: bash
        run: |
          chmod +x ./build.sh
          ./build.sh simlibs_release

      - name: Test SimLibs
        shell: bash
        run: |
          ./build.sh test_simlibs_release
